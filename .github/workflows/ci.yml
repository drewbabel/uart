name: CI

on: [push, pull_request]

jobs:
  testbenches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Icarus Verilog
        run: |
          sudo grep -rlZ packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -0 -r rm -f
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: synchronizer
        run: make MOD=synchronizer
      - name: tick_gen
        run: make MOD=tick_gen
      - name: uart_rx
        run: make MOD=uart_rx
      - name: uart_tx
        run: make MOD=uart_tx
      - name: uart
        run: make MOD=uart
      - name: board demo (seven_seg + debounce + top)
        run: make -C boards/basys3 test
      - name: Install cocotb
        run: pip install cocotb
      - name: cocotb top-level loopback
        run: make cocotb

  formal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OSS CAD Suite (yosys + sby + solvers)
        uses: YosysHQ/setup-oss-cad-suite@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: uart_rx formal
        run: make formal MOD=uart_rx
      - name: uart_tx formal
        run: make formal MOD=uart_tx
